<script>
/* ============================================================
   급식 알리미 (전국판) — 나이스 Open API 연동
   - 인증키: open.neis.go.kr 에서 발급 → 설정(⚙)에 입력
   - 프록시: CORS 우회용. 비워두면 직접 호출(보통 막힘)

// ---------- 설정 ----------
// ============================================================
//  ▼▼▼ 여기 한 줄만 본인 Cloudflare Worker 주소로 바꿔주세요 ▼▼▼
const PROXY = "https://meal-proxy.mymmj8423pshs.workers.dev/";
//  ▲▲▲ 나이스 인증키는 워커 안에 숨겨져 있어요 (사용자 입력 불필요) ▲▲▲
// ============================================================

const LS = {
  school: 'meal_school',
  nick:   'meal_nick',
};
function getSchool(){ try { return JSON.parse(localStorage.getItem(LS.school) || 'null'); } catch(e){ return null; } }
function setSchool(s){ localStorage.setItem(LS.school, JSON.stringify(s)); }

let myNick = localStorage.getItem(LS.nick) || ('익명' + Math.floor(Math.random()*9000+1000));
localStorage.setItem(LS.nick, myNick);

// ---------- 상태 ----------
const ORDER = ['조식','중식','석식'];
const MEALCODE = { '조식':'b', '중식':'l', '석식':'d' };
const DEFAULT_TIMES = { b:'08:00', l:'12:30', d:'18:30' };

let school = getSchool();                 // {office, code, name, kind, addr}
const _now = new Date();
let viewYear  = _now.getFullYear();
let viewMonth = _now.getMonth() + 1;      // 1~12
let meals = { 조식:{}, 중식:{}, 석식:{} }; // {조식:{1:{items,kcal}}, ...}
let selectedDay = null;
let selectedMeal = '중식';
let globalStars = {};                      // 선택 학교의 별점 { "20260601_l_백미밥": 3 }
let favorites = {};                        // 내 별표 (localStorage)
let mealTimes = { ...DEFAULT_TIMES };      // 선택 학교의 급식시간

// ---------- 유틸 ----------
function pad(n){ return String(n).padStart(2,'0'); }
function ymdStr(y,m,d){ return `${y}${pad(m)}${pad(d)}`; }
function schoolKey(){ return school ? `${school.office}_${school.code}` : ''; }
function favLSKey(){ return `meal_favs_${schoolKey()}`; }
function cleanName(s){ return s.replace(/\s*\(\s*[\d.\s]+\)\s*$/, '').replace(/\s+/g,' ').trim(); }
function getAllergy(s){ const m = s.match(/\(\s*([\d.\s]+)\)\s*$/); return m ? m[1].replace(/\s/g,'') : ''; }
function safeKey(s){ return cleanName(s).replace(/[.#$/\[\]]/g,'_'); }
function escapeHtml(str){ return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;"); }

// ---------- 나이스 호출 ----------
function neisUrl(endpoint, params){
  const base = `https://open.neis.go.kr/hub/${endpoint}`;
  const qs = new URLSearchParams({ Type:'json', pIndex:'1', pSize:'500', ...params }).toString();
  const full = `${base}?${qs}`;
  return PROXY.replace(/\/$/,'') + '/?url=' + encodeURIComponent(full);
}
async function neisFetch(endpoint, params){
  const res = await fetch(neisUrl(endpoint, params));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function searchSchools(name){
  const json = await neisFetch('schoolInfo', { SCHUL_NM:name });
  return json?.schoolInfo?.[1]?.row || [];
}

async function loadMeals(){
  meals = { 조식:{}, 중식:{}, 석식:{} };
  if (!school) { renderMain(); return; }
  renderMain(true); // 로딩 표시
  try {
    const last = new Date(viewYear, viewMonth, 0).getDate();
    const from = ymdStr(viewYear, viewMonth, 1);
    const to   = ymdStr(viewYear, viewMonth, last);
    const json = await neisFetch('mealServiceDietInfo', {
      ATPT_OFCDC_SC_CODE: school.office,
      SD_SCHUL_CODE: school.code,
      MLSV_FROM_YMD: from,
      MLSV_TO_YMD: to,
    });
    const rows = json?.mealServiceDietInfo?.[1]?.row || [];
    rows.forEach(r => {
      const nm = r.MMEAL_SC_NM || '';
      const day = parseInt(String(r.MLSV_YMD).slice(6,8), 10);
      const items = String(r.DDISH_NM || '').split(/<br\s*\/?>/i).map(s => s.trim()).filter(Boolean);
      const kcal = Math.round((parseFloat(String(r.CAL_INFO || '').replace(/[^\d.]/g,'')) || 0) * 10) / 10;
      const key = nm.includes('조') ? '조식' : nm.includes('중') ? '중식' : nm.includes('석') ? '석식' : null;
      if (!key) return;
      meals[key][day] = { items, kcal };
    });
  } catch (e) {
    console.error(e);
    renderMain(false, '급식을 못 불러왔어요 😢 인증키나 프록시 설정을 확인해 주세요.\n(' + e.message + ')');
    return;
  }
  renderMain();
  if (selectedDay && selectedDay <= new Date(viewYear, viewMonth, 0).getDate()) selectDay(selectedDay, true);
}

// ---------- 메인 렌더 ----------

        <p>우리 학교를 검색해서 선택하면<br>바로 급식을 볼 수 있어요!</p>

      <div class="dow">수</div><div class="dow">목</div><div class="dow">금</div><div class="dow sat">토</div>
      ${calInner}
    </div>
    <div class="main-content" id="mainContent" style="display:${selectedDay ? 'grid' : 'none'};">

function buildCalendarHTML(){
  const firstDow = new Date(viewYear, viewMonth - 1, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth, 0).getDate();
  const real = new Date();
  const isThisMonth = real.getFullYear() === viewYear && (real.getMonth() + 1) === viewMonth;
  const todayDate = real.getDate();

  let html = '';
  for (let i = 0; i < firstDow; i++) html += `<div class="day empty"></div>`;

  const mealEmoji = { '조식':'♨', '중식':'´▽`♡', '석식':'♬' };
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (firstDow + d - 1) % 7;
    const cls = ['day'];
    if (dow === 0) cls.push('sun');
    if (dow === 6) cls.push('sat');
    if (isThisMonth && d === todayDate) cls.push('today');
    if (d === selectedDay) cls.push('selected');

    const anyMeal = meals['조식'][d] || meals['중식'][d] || meals['석식'][d];
    let lines;
    if (!anyMeal) {
      lines = `<div class="summary-line no-data">· · ·</div>`;
    } else {
      lines = ORDER.map(meal => {
        if (!meals[meal][d]) return '';
        const stars = getStarCount(d, meal);
        let favName = '';
        if (stars > 0) {
          const favItem = meals[meal][d].items.find(it => favorites[favId(d, meal, it)]);
          if (favItem) favName = `<span class="cal-fav-name">${escapeHtml(cleanName(favItem))}</span>`;
        }
        return `<div class="summary-line ${stars > 0 ? 'has-stars' : ''}">${mealEmoji[meal]} ${stars}${favName}</div>`;
      }).join('');
    }
    html += `<div class="${cls.join(' ')}" id="day-cell-${d}" onclick="selectDay(${d})">
      <div class="day-num">${d}</div><div class="day-stars-summary">${lines}</div>
    </div>`;
  }
  return html;
}

function buildTimerHTML(){
  return `
    <div class="timer-box">
      <span class="timer-edit" onclick="openTimeEditor()">⏰ 급식시간 수정</span>
      <div class="timer-label" id="timerLabel">⏳</div>
      <div class="timer-meal-name" id="timerMealName"></div>
      <div class="timer-menu-preview" id="timerMenuPreview"></div>
      <div class="timer-count" id="timerCount">
        <div class="timer-unit"><div class="timer-num" id="timerH">--</div><div class="timer-unit-label">시간</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-unit"><div class="timer-num" id="timerM">--</div><div class="timer-unit-label">분</div></div>
        <div class="timer-sep">:</div>
        <div class="timer-unit"><div class="timer-num" id="timerS">--</div><div class="timer-unit-label">초</div></div>
      </div>
    </div>`;
}

// ---------- 날짜/끼니 선택 ----------
function changeMonth(delta){
  viewMonth += delta;
  if (viewMonth < 1) { viewMonth = 12; viewYear--; }
  if (viewMonth > 12) { viewMonth = 1; viewYear++; }
  selectedDay = null;
  loadMeals();
}

function selectDay(d, keepScroll){
  selectedDay = d;
  document.querySelectorAll('.day').forEach(el => {
    el.classList.toggle('selected', el.id === `day-cell-${d}`);
  });
  const mc = document.getElementById('mainContent');
  if (mc) mc.style.display = 'grid';
  // 선택한 날 첫 유효 끼니로
  if (!meals[selectedMeal][d]) {
    const firstAvail = ORDER.find(m => meals[m][d]);
    if (firstAvail) selectedMeal = firstAvail;
  }
  renderDetail();
  connectCommentRoom();
}

function switchMeal(m){ selectedMeal = m; renderDetail(); connectCommentRoom(); }

function favId(day, meal, item){ return `${ymdStr(viewYear,viewMonth,day)}_${MEALCODE[meal]}_${safeKey(item)}`; }

function getStarCount(day, meal){
  let count = 0;
  if (!meals[meal] || !meals[meal][day]) return 0;
  meals[meal][day].items.forEach(item => { if (favorites[favId(day, meal, item)]) count++; });
  return count;
}

function toggleFavorite(day, meal, item){
  const id = favId(day, meal, item);
  const wasOn = !!favorites[id];
  favorites[id] = !wasOn;
  localStorage.setItem(favLSKey(), JSON.stringify(favorites));

  // Firebase 공유 별점 증감 (학교별)
  if (window._fbDb && window._fbRunTransaction && schoolKey()) {
    const starPath = `stars/${schoolKey()}/${id}`;
    const starRef = window._fbRef(window._fbDb, starPath);
    window._fbRunTransaction(starRef, cur => Math.max(0, (cur || 0) + (wasOn ? -1 : 1)));
  }
  renderDetail();
  refreshCalendarCell(day);
}

function refreshCalendarCell(day){
  const cell = document.getElementById(`day-cell-${day}`);
  if (!cell) return;
  const mealEmoji = { '조식':'♨', '중식':'´▽`♡', '석식':'♬' };
  const lines = ORDER.map(meal => {
    if (!meals[meal][day]) return '';
    const stars = getStarCount(day, meal);
    let favName = '';
    if (stars > 0) {
      const favItem = meals[meal][day].items.find(it => favorites[favId(day, meal, it)]);
      if (favItem) favName = `<span class="cal-fav-name">${escapeHtml(cleanName(favItem))}</span>`;
    }
    return `<div class="summary-line ${stars > 0 ? 'has-stars' : ''}">${mealEmoji[meal]} ${stars}${favName}</div>`;
  }).join('');
  cell.querySelector('.day-stars-summary').innerHTML = lines || `<div class="summary-line no-data">· · ·</div>`;
}

function renderDetail(){
  const detailEl = document.getElementById('detail');
  if (!detailEl || !selectedDay) return;
  const d = selectedDay;
  const firstDow = new Date(viewYear, viewMonth - 1, 1).getDay();
  const DOW = ['일','월','화','수','목','금','토'];
  const dow = DOW[(firstDow + d - 1) % 7];
  const data = meals[selectedMeal][d];
  const tabClasses = { '조식':'active-b', '중식':'active-l', '석식':'active-d' };

  const tabs = ORDER.map(m => {
    const avail = !!meals[m][d];
    const stars = getStarCount(d, m);
    return `<button class="tab${m===selectedMeal?' '+tabClasses[m]:''}" style="${avail?'':'opacity:.4;'}" onclick="switchMeal('${m}')">${m} ${stars>0?`<span class="tab-stars">★${stars}</span>`:''}</button>`;
  }).join('');

  let rows = '';
  if (data) {
    const starCounts = data.items.map(item => globalStars[favId(d, selectedMeal, item)] || 0);
    const maxStars = Math.max(0, ...starCounts);
    rows = data.items.map((item, idx) => {
      const isFav = !!favorites[favId(d, selectedMeal, item)];
      const count = starCounts[idx];
      const isCrown = maxStars > 0 && count === maxStars;
      const starBadge = count > 0 ? `<span class="global-stars">(별 ${count})</span>` : '';
      const crown = isCrown ? `<span class="crown">👑</span>` : '';
      const allergy = getAllergy(item);
      return `<div class="menu-row ${isFav ? 'favorite' : ''}" onclick="toggleFavorite(${d}, '${selectedMeal}', ${JSON.stringify(item).replace(/"/g,'&quot;')})">
        <div class="menu-left"><span class="star-icon">★</span><span class="menu-name">${crown}${escapeHtml(cleanName(item))}</span>${starBadge}</div>
        ${allergy ? `<span class="allergy">${allergy}</span>` : ''}
      </div>`;
    }).join('');
  } else {
    rows = `<div class="no-meal">${selectedMeal} 정보가 없어요 🍃</div>`;
  }

  detailEl.innerHTML = `
    <div class="detail-header"><span class="detail-date">${viewMonth}월 ${d}일 (${dow})</span>${data && data.kcal ? `<span class="detail-kcal">🔥 ${data.kcal} kcal</span>` : ''}</div>
    <div class="meal-tabs">${tabs}</div>
    <div class="menu-list">${rows}</div>`;
}

// ---------- Firebase: 댓글 / 별점 (학교별) ----------
function connectCommentRoom(){
  if (window._fbCurrentUnsub) { window._fbCurrentUnsub(); window._fbCurrentUnsub = null; }
  if (!window._fbDb || !selectedDay || !schoolKey()) return;

  const roomPath = `comments/${schoolKey()}/${ymdStr(viewYear,viewMonth,selectedDay)}_${MEALCODE[selectedMeal]}`;
  window._currentRoomPath = roomPath;
  const listEl = document.getElementById('commentList');
  if (listEl) listEl.innerHTML = '<div class="no-comments">불러오는 중...</div>';

  const commentsRef = window._fbRef(window._fbDb, roomPath);
  window._fbCurrentUnsub = window._fbOnValue(commentsRef, snap => {
    const data = snap.val();
    const el = document.getElementById('commentList');
    if (!el) return;
    if (!data) { el.innerHTML = '<div class="no-comments">아직 한줄평이 없어요.<br>첫 댓글을 남겨보세요! 🩷</div>'; return; }
    const arr = Object.values(data).sort((a,b) => a.ts - b.ts);
    el.innerHTML = arr.map(c => `
      <div class="comment-item">
        <div class="comment-meta"><span>👤 ${escapeHtml(c.nick)}</span><span>${c.time || ''}</span></div>
        <div>${escapeHtml(c.text)}</div>
      </div>`).join('');
    el.scrollTop = el.scrollHeight;
  });
}

function connectStars(){
  if (window._fbStarUnsub) { window._fbStarUnsub(); window._fbStarUnsub = null; }
  if (!window._fbDb || !schoolKey()) return;
  const starRef = window._fbRef(window._fbDb, `stars/${schoolKey()}`);
  window._fbStarUnsub = window._fbOnValue(starRef, snap => {
    globalStars = snap.val() || {};
    if (selectedDay) renderDetail();
  });
}

function connectMealTimes(){
  if (window._fbTimeUnsub) { window._fbTimeUnsub(); window._fbTimeUnsub = null; }
  if (!window._fbDb || !schoolKey()) return;
  const timeRef = window._fbRef(window._fbDb, `mealtimes/${schoolKey()}`);
  window._fbTimeUnsub = window._fbOnValue(timeRef, snap => {
    mealTimes = { ...DEFAULT_TIMES, ...(snap.val() || {}) };
  });
}

function jsAddComment(){
  const input = document.getElementById('commentInput');
  if (!input) return;
  const txt = input.value.trim();
  if (!txt || !window._fbDb || !window._currentRoomPath) return;
  const now = new Date();
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  window._fbPush(window._fbRef(window._fbDb, window._currentRoomPath), {
    nick: myNick, text: txt, time: timeStr, ts: now.getTime()
  });
  input.value = '';
}

function changeNick(){
  const n = prompt('새 별명을 입력해 주세요', myNick);
  if (n && n.trim()) {
    myNick = n.trim().slice(0, 20);
    localStorage.setItem(LS.nick, myNick);
    renderMain();
  }
}

// ---------- 학교 선택 모달 ----------
function openSchoolModal(){
  document.getElementById('modalMount').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>🏫 학교 검색</h2>

          <button class="btn-primary" onclick="doSearchSchool()">검색</button>
          <button class="btn-ghost" onclick="closeModal()">닫기</button>

        <div class="search-result" id="schoolSearchResult"></div>

async function doSearchSchool(){
  const q = document.getElementById('schoolSearchInput').value.trim();
  const box = document.getElementById('schoolSearchResult');
  if (!q) return;
  box.innerHTML = `<div class="loading">검색 중... 🔍</div>`;
  try {
    const list = await searchSchools(q);
    if (!list.length) { box.innerHTML = `<div class="loading">결과가 없어요. 이름을 다시 확인해 주세요.</div>`; return; }
    box.innerHTML = list.slice(0, 30).map(s => {
      const obj = { office: s.ATPT_OFCDC_SC_CODE, code: s.SD_SCHUL_CODE, name: s.SCHUL_NM, kind: s.SCHUL_KND_SC_NM || '', addr: s.ORG_RDNMA || '' };
      const enc = encodeURIComponent(JSON.stringify(obj));
      return `<div class="school-item" onclick="pickSchool('${enc}')">
        <div class="nm">${escapeHtml(s.SCHUL_NM)}</div>
        <div class="meta">${escapeHtml((s.LCTN_SC_NM||'') + ' · ' + (s.SCHUL_KND_SC_NM||'') )}${s.ORG_RDNMA ? ' · ' + escapeHtml(s.ORG_RDNMA) : ''}</div>
      </div>`;
    }).join('');
  } catch (e) {
    box.innerHTML = `<div class="loading" style="color:#d04080;">검색 실패 😢 인증키/프록시를 확인해 주세요.<br>(${escapeHtml(e.message)})</div>`;
  }
}

function pickSchool(enc){
  school = JSON.parse(decodeURIComponent(enc));
  setSchool(school);
  favorites = {};
  try { favorites = JSON.parse(localStorage.getItem(favLSKey()) || '{}'); } catch(e){}
  globalStars = {};
  selectedDay = null;
  closeModal();
  connectStars();
  connectMealTimes();
  loadMeals();
}

// ---------- 급식시간 수정 모달 ----------
function openTimeEditor(){
  if (!schoolKey()) return;
  document.getElementById('modalMount').innerHTML = `
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>⏰ 급식시간</h2>
        <p class="hint"><b>${escapeHtml(school.name)}</b>의 급식시간이에요. 저장하면 이 학교를 보는 모든 친구에게 공유돼요.</p>
        <div class="time-edit-row">🌅 조식 <input type="time" id="timeB" value="${mealTimes.b}"></div>
        <div class="time-edit-row">🍱 중식 <input type="time" id="timeL" value="${mealTimes.l}"></div>

          <button class="btn-primary" onclick="saveTimes()">저장</button>
          <button class="btn-ghost" onclick="closeModal()">닫기</button>
        </div>
      </div>
    </div>`;
}
function saveTimes(){
  const t = { b: document.getElementById('timeB').value || DEFAULT_TIMES.b,
              l: document.getElementById('timeL').value || DEFAULT_TIMES.l,
              d: document.getElementById('timeD').value || DEFAULT_TIMES.d };
  mealTimes = t;
  if (window._fbDb && window._fbSet && schoolKey()) {
    window._fbSet(window._fbRef(window._fbDb, `mealtimes/${schoolKey()}`), t);
  }
  closeModal();
}

function closeModal(){ document.getElementById('modalMount').innerHTML = ''; }

// ---------- 타이머 ----------
(function(){
  function getMenuPreview(mealKey){
    const real = new Date();
    if (real.getFullYear() !== viewYear || (real.getMonth()+1) !== viewMonth) return '';
    const data = meals[mealKey] && meals[mealKey][real.getDate()];
    if (!data || !data.items) return '';
    return data.items.slice(0, 3).map(i => cleanName(i)).join(' · ');
  }
  function tick(){
    const labelEl = document.getElementById('timerLabel');
    if (!labelEl) return; // 타이머 미표시 상태
    const now = new Date();
    const order = [ ['b','조식','🌅'], ['l','중식','🍱'], ['d','석식','🌙'] ];
    let target = null, tInfo = null;
    for (const [code, nm, emo] of order) {
      const [hh, mm] = (mealTimes[code] || DEFAULT_TIMES[code]).split(':').map(Number);
      const t = new Date(now); t.setHours(hh, mm, 0, 0);
      if (t > now) { target = t; tInfo = { code, nm, emo, hh, mm }; break; }
    }
    const nameEl = document.getElementById('timerMealName');
    const previewEl = document.getElementById('timerMenuPreview');
    const hEl = document.getElementById('timerH'), mEl = document.getElementById('timerM'), sEl = document.getElementById('timerS');
    if (!target) {
      labelEl.textContent = '🌙 오늘 급식 끝!';
      nameEl.textContent = '내일 또 만나요 👋';
      previewEl.textContent = '';
      hEl.textContent = '--'; mEl.textContent = '--'; sEl.textContent = '--';
      return;
    }
    const diff = Math.max(0, Math.floor((target - now) / 1000));
    labelEl.textContent = `⏳ ${tInfo.nm}까지`;
    nameEl.textContent = `${tInfo.emo} ${pad(tInfo.hh)}:${pad(tInfo.mm)} ${tInfo.nm}`;
    previewEl.textContent = getMenuPreview(tInfo.nm);
    hEl.textContent = pad(Math.floor(diff/3600));
    mEl.textContent = pad(Math.floor((diff%3600)/60));
    sEl.textContent = pad(diff%60);
  }
  setInterval(tick, 1000);
  window._timerTick = tick;
})();

// ---------- 초기화 ----------
function boot(){
  if (school) {
    try { favorites = JSON.parse(localStorage.getItem(favLSKey()) || '{}'); } catch(e){}
    connectStars();
    connectMealTimes();
    loadMeals();
  } else {
    renderMain();
  }
}
window._pendingInit = boot;
if (window._firebaseReady) boot();

      el.textContent = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      const size = 10 + Math.random() * 16, angle = Math.random() * 360, dist = 40 + Math.random() * 80;
      const dx = Math.cos(angle*Math.PI/180)*dist, dy = Math.sin(angle*Math.PI/180)*dist, dur = 500 + Math.random()*500;
      Object.assign(el.style, {
        position:'fixed', left:e.clientX+'px', top:e.clientY+'px', fontSize:size+'px',
        color:COLORS[Math.floor(Math.random()*COLORS.length)], pointerEvents:'none', zIndex:99999,
        userSelect:'none', transform:'translate(-50%,-50%)',
        transition:`transform ${dur}ms ease-out, opacity ${dur}ms ease-out`, opacity:'1',
        textShadow:'0 0 4px #fff', fontFamily:'serif',
      });
      document.body.appendChild(el);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(0.3) rotate(${angle}deg)`;
        el.style.opacity = '0';
      }));
      setTimeout(() => el.remove(), dur + 50);
    }
  });
})();
</script>
</body>
</html>
